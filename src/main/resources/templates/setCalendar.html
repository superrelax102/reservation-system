<!DOCTYPE html>
<html lang="ja" xmlns=:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム | 予定日時選択画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>
            <span th:text="${username}">username</span>さん、こんにちは！
        </h1>
        <h2>
            <span th:text="${menuId}">menuId</span>を選択中
        </h2>
    </header>
    <table border="1">
        <thead>
            <tr>
                <th>日付</th>
                <th>予約枠</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="day : ${calendar}">
                <td nowrap>
                    <span th:text="${#temporals.format(day.date, 'MM/dd')}"></span>
                    <!-- (<span th:text="${day.dayOfWeek}"></span>) -->
                </td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <div th:each="slot : ${day.slots}" 
                            style="border: 
                            1px solid #ccc; padding: 5px; text-align: center;">
                            <small th:text="${slot.startTime}"></small><br>
                            <span th:text="${slot.statusLabel}"></span>
                        </div>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <footer class="bottom-nav">
        <div class="summary">
            <p>選択中：<span>4月6日 10:00〜</span></p>
        </div>
        <button class="next-btn">次へ進む</button>
    </footer>
</body>
</html>
