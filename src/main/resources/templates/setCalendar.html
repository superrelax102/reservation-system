<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム | 予定日時選択画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1><span th:text="${username}">username</span>さん、こんにちは！</h1>
        <p><span th:text="${menuname}">メニュー名</span>の予約日時を選んでください</p>
    </header>

    <table class="menu-list">
        <thead>
            <tr>
                <th>日付</th>
                <th>予約可能な時間枠</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="day : ${calendar}">
                <td>
                    <strong th:text="${#temporals.format(day.date, 'MM/dd')}"></strong>
                </td>
                <td>
                    <div class="slot-container">
                        <div th:each="slot : ${day.slots}" 
                             class="slot-item" 
                             th:classappend="${!slot.isAvailable} ? 'unavailable'">
                            
                            <small th:text="${slot.startTime}"></small><br>
                            
                            <div th:if="${slot.isAvailable}">
                                <form th:action="@{/confirm-reservation}" method="POST">
                                    <input type="hidden" name="username" th:value="${username}">
                                    <input type="hidden" name="date" th:value="${day.date}">
                                    <input type="hidden" name="time" th:value="${slot.startTime}">
                                    <input type="hidden" name="menuid" th:value="${menuid}">
                                    <button type="submit">○</button>
                                </form>
                            </div>
                            
                            <div th:if="${!slot.isAvailable}">
                                <span>×</span>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
